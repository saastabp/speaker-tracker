name: CI

on:
  push:
    branches: [main, 'slices/**']
  pull_request:

# No deploy step anywhere — deploys stay manual (DEV-PLAN §8).
jobs:
  backend:
    name: backend (ruff + pytest)
    runs-on: ubuntu-latest
    services:
      mysql:
        # Pinned to match RDS 8.4 — 8.0 differs on utf8mb4 collation defaults (DEV-PLAN §8).
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: speakertracker_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot --silent"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=15
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - name: Install Python 3.12
        run: uv python install 3.12
      - name: Sync deps (frozen)
        working-directory: backend
        run: uv sync --frozen
      - name: Ruff lint
        working-directory: backend
        run: uv run ruff check .
      - name: Ruff format check
        working-directory: backend
        run: uv run ruff format --check .
      - name: Ban pymysql Connection.ping()
        # Belt-and-suspenders with the ruff banned-api rule: ping(reconnect=True) reuses the
        # expired IAM token on a reused connection (CODING-GUIDELINES §1).
        run: |
          if grep -rnE '\.ping\s*\(' backend/src; then
            echo "::error::pymysql Connection.ping() is banned; use the db.py reconnect path"
            exit 1
          fi
      - name: Pytest (DB-backed against mysql:8.4)
        working-directory: backend
        env:
          TEST_DATABASE_URL: mysql://root:root@127.0.0.1:3306/speakertracker_test
        run: uv run pytest

  frontend:
    name: frontend (tsc + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install deps
        working-directory: frontend
        run: npm ci
      - name: Typecheck
        working-directory: frontend
        run: npm run typecheck
      - name: Build (sandbox)
        working-directory: frontend
        run: npm run build:sandbox
      - name: Build (production)
        working-directory: frontend
        run: npm run build:production

  infra:
    name: infra (cdk synth + jest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: infra/cdk/package-lock.json
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - name: Install Python 3.12
        run: uv python install 3.12
      - name: Prepare backend env (bundling discovers this interpreter)
        working-directory: backend
        run: uv sync --frozen
      - name: Install CDK deps
        working-directory: infra/cdk
        run: npm ci
      - name: Typecheck
        working-directory: infra/cdk
        run: npm run typecheck
      - name: Synth all stacks (credential-free; builds the real Lambda bundle via uv)
        working-directory: infra/cdk
        run: npx cdk synth --all
      - name: Jest (authorizer security invariant)
        working-directory: infra/cdk
        run: npm test